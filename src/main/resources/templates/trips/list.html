<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Mes Trajets')}"></head>
<body class="bg-light">
<div class="mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamin-triangle me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('trips')}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2">Historique des Trajets</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTripModal">
                    <i class="bi bi-plus-circle me-2"></i>Nouveau Trajet
                </button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Référence</th>
                            <th>Date</th>
                            <th>Transport</th>
                            <th>Itinéraire</th>
                            <th>Montant</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="trip : ${trips}">
                            <td class="fw-bold" th:text="${trip.tripRef}">REF-123</td>
                            <td th:text="${#temporals.format(trip.startTime, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                            <td><span class="badge bg-secondary" th:text="${trip.transportType}">TER</span></td>
                            <td th:text="${trip.origin + ' → ' + trip.destination}">Dakar → Diamniadio</td>
                            <td th:text="${trip.amountCharged + ' XOF'}">0</td>
                            <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="${trip.status == 'COMPLETED' ? 'bg-success' : 'bg-warning'}"
                                          th:text="${trip.status}">OK</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="modal fade" id="newTripModal" tabindex="-1">
                <div class="modal-dialog">
                    <form th:action="@{/trips/new}" th:object="${tripRequest}" method="post" class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Enregistrer un trajet</h5>
                            <button type="button" class="btn-close" data-bs-toggle="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Type de transport</label>
                                <select th:field="*{transportType}" class="form-select">
                                    <option value="BUS">Bus Classique (DDD)</option>
                                    <option value="TER">Train (TER)</option>
                                    <option value="BRT">Bus (BRT)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Départ</label>
                                <input type="text" th:field="*{origin}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Arrivée</label>
                                <input type="text" th:field="*{destination}" class="form-control" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">Valider le trajet</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
