<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Smart Mobility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .sidebar { min-height: 100vh; background: #2c3e50; color: white; }
        .nav-link { color: rgba(255,255,255,0.8); }
        .nav-link.active { background: #34495e; color: #3498db !important; border-left: 4px solid #3498db; }
        .nav-link:hover { color: white; }
        .card-stat { border: none; border-radius: 15px; transition: transform 0.3s; }
        .card-stat:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<div th:fragment="sidebar(activeMenu)" class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
    <h4 class="text-center mb-4">Smart Mobility</h4>
    <hr>
    <ul class="nav flex-column">
        <li class="nav-item" th:if="${session.role == 'ADMIN'}">
            <a class="nav-link" th:classappend="${activeMenu == 'admin-users' ? 'active' : ''}" th:href="@{/admin/users}">
                <i class="bi bi-people-fill me-2"></i> Gestion Users
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'dashboard' ? 'active' : ''}" th:href="@{/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'trips' ? 'active' : ''}" th:href="@{/trips}">
                <i class="bi bi-geo-alt me-2"></i> Mes Trajets
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'billing' ? 'active' : ''}" th:href="@{/billing}">
                <i class="bi bi-wallet2 me-2"></i> Portefeuille
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'pass' ? 'active' : ''}" th:href="@{/pass}">
                <i class="bi bi-card-heading me-2"></i> Mon Pass
            </a>
        </li>
    </ul>
    <div class="mt-5">
        <a th:href="@{/logout}" class="btn btn-outline-danger w-100">Déconnexion</a>
    </div>
</div>

</body>
</html>
