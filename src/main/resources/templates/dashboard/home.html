<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Dashboard')}"></head>
<body class="bg-light">
<div class="mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamin-triangle me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Bienvenue, <span th:text="${user.firstName}">Khadija</span> !</h1>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card card-stat bg-primary text-white p-3 shadow-sm">
                        <div class="d-flex align-items-center">
                            <div class="fs-1 me-3"><i class="bi bi-cash-stack"></i></div>
                            <div>
                                <h6 class="card-title mb-1">Mon Solde</h6>
                                <h3 class="mb-0"><span th:text="${balance}">0</span> XOF</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card card-stat bg-success text-white p-3 shadow-sm">
                        <div class="d-flex align-items-center">
                            <div class="fs-1 me-3"><i class="bi bi-map"></i></div>
                            <div>
                                <h6 class="card-title mb-1">Total Trajets</h6>
                                <h3 class="mb-0"><span th:text="${user.totalTrips}">0</span></h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="card card-stat bg-info text-white p-3 shadow-sm">
                        <div class="d-flex align-items-center">
                            <div class="fs-1 me-3"><i class="bi bi-credit-card"></i></div>
                            <div>
                                <h6 class="card-title mb-1">Status du Pass</h6>
                                <h3 class="mb-0" th:text="${user.mobilityPass != null ? user.mobilityPass.status : 'AUCUN'}">ACTIVE</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm border-0 mt-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">Dernière activité</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted">Utilisez le menu pour gérer vos trajets et recharger votre compte.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
