<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Connexion')}"></head>
<body class="bg-primary d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Smart Mobility</h2>
                    <p class="text-muted">Connectez-vous à votre espace</p>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <div th:if="${warning}" class="alert alert-warning" th:text="${warning}"></div>

                <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="nom@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Se connecter</button>
                </form>

                <div class="text-center mt-3">
                    <p class="small text-muted">Pas encore de compte ? <a th:href="@{/register}" class="text-decoration-none">S'inscrire</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
