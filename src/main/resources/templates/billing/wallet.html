<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Portefeuille')}"></head>
<body class="bg-light">
<div class="mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamin-triangle me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('billing')}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <h1 class="h2 mb-4">Gestion du Portefeuille</h1>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-4 text-center">
                        <h6 class="text-muted">Solde Actuel</h6>
                        <h1 class="display-4 fw-bold text-primary"><span th:text="${balance}">0</span> XOF</h1>
                        <hr>
                        <form th:action="@{/billing/credit}" th:object="${creditRequest}" method="post">
                            <div class="mb-3">
                                <input type="number" th:field="*{amount}" class="form-control text-center" placeholder="Montant à recharger" required min="500">
                            </div>
                            <button type="submit" class="btn btn-success w-100">Recharger via PayDunya</button>
                        </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Dernières transactions</h5>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                <tr>
                                    <th>Ref</th>
                                    <th>Type</th>
                                    <th>Montant</th>
                                    <th>Status</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="txn : ${history}">
                                    <td th:text="${txn.txnRef}">TXN-001</td>
                                    <td th:text="${txn.type}">CREDIT</td>
                                    <td th:text="${txn.amount + ' XOF'}"
                                        th:classappend="${txn.type == 'DEBIT' ? 'text-danger' : 'text-success'}"></td>
                                    <td th:text="${txn.status}">SUCCESS</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
