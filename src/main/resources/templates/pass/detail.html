<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Mon Pass')}"></head>
<body class="bg-light">
<div class="mt-3">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamin-triangle me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/layout :: sidebar('pass')}"></div>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <h1 class="h2 mb-4">Mon Pass Mobilité</h1>
            <div class="row">
                <div class="col-md-6">
                    <div class="card shadow-sm border-0 text-center p-4">
                        <div class="mb-3">
                            <i class="bi bi-qr-code fs-1 text-primary"></i>
                        </div>
                        <h4 class="fw-bold" th:text="${pass.passNumber}">SN-123456</h4>
                        <p class="text-muted" th:text="${'Type: ' + pass.passType}">ABONNEMENT</p>
                        <div class="badge p-2 mb-3" th:classappend="${pass.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                             th:text="${pass.status}">ACTIVE</div>

                        <div class="d-grid gap-2">
                            <form th:if="${pass.status == 'ACTIVE'}" th:action="@{/pass/suspend}" method="post">
                                <input type="hidden" name="passNumber" th:value="${pass.passNumber}">
                                <button class="btn btn-outline-danger w-100">Suspendre mon Pass</button>
                            </form>
                            <form th:if="${pass.status == 'SUSPENDED'}" th:action="@{/pass/reactivate}" method="post">
                                <input type="hidden" name="passNumber" th:value="${pass.passNumber}">
                                <button class="btn btn-success w-100">Réactiver mon Pass</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
